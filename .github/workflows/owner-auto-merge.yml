name: Owner auto-merge

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
      - edited

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: owner-auto-merge-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  enable-owner-auto-merge:
    name: Enable owner auto-merge
    if: >
      github.event.pull_request.user.login == 'Will-thom' &&
      github.event.pull_request.base.ref == 'main' &&
      github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Enable auto-merge for owner PR
        env:
          GH_TOKEN: ${{ github.token }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: gh pr merge "$PR_URL" --auto --merge
