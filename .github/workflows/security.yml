name: Security

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "17 9 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

  workflow-permissions-audit:
    name: Workflow permissions audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check workflow permission posture
        run: |
          set -euo pipefail

          if grep -R "write""-all" .github/workflows; then
            echo "Do not use broad workflow write permissions."
            exit 1
          fi

          missing_permissions="$(find .github/workflows -name '*.yml' -print0 | xargs -0 grep -L '^permissions:' || true)"
          if [ -n "$missing_permissions" ]; then
            echo "Every workflow must declare explicit top-level permissions:"
            echo "$missing_permissions"
            exit 1
          fi

          echo "Workflow permission audit passed."

  all-security-checks:
    name: All security checks
    runs-on: ubuntu-latest
    needs:
      - dependency-audit
      - workflow-permissions-audit
    steps:
      - name: Report success
        run: echo "Security checks passed."
