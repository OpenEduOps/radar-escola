name: Desktop Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: desktop-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  preflight:
    name: Desktop release preflight
    runs-on: ubuntu-latest
    outputs:
      ready: ${{ steps.check.outputs.ready }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check desktop app scaffold
        id: check
        run: |
          set -euo pipefail

          required_paths=(
            "package.json"
            "package-lock.json"
            "src-tauri/Cargo.toml"
            "scripts/smoke-windows.ps1"
          )

          missing=()
          for path in "${required_paths[@]}"; do
            if [ ! -e "$path" ]; then
              missing+=("$path")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Desktop app scaffold is not ready yet."
            echo "Missing required paths:"
            printf -- "- %s\n" "${missing[@]}"
            echo
            echo "This repository currently contains organization and product documentation."
            echo "The end-to-end desktop release workflow becomes active when the Radar Escola app scaffold exists."

            if [ "${GITHUB_REF_TYPE:-}" = "tag" ]; then
              echo "Tagged releases must fail until the desktop app scaffold exists."
              exit 1
            fi

            exit 0
          fi

          echo "ready=true" >> "$GITHUB_OUTPUT"

  build-windows-installer:
    name: Build Windows installer
    if: needs.preflight.outputs.ready == 'true'
    runs-on: windows-latest
    needs:
      - preflight
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Validate frontend
        run: |
          npm run lint --if-present
          npm run typecheck --if-present
          npm test --if-present
          npm run build --if-present

      - name: Validate Rust/Tauri
        working-directory: src-tauri
        run: |
          cargo fmt --check
          cargo clippy -- -D warnings
          cargo test

      - name: Build Tauri Windows installer
        run: npm run tauri -- build --ci --no-sign

      - name: Smoke test installer on Windows
        shell: pwsh
        run: .\scripts\smoke-windows.ps1

      - name: Collect installer artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist-artifacts | Out-Null

          $candidates = Get-ChildItem -Path src-tauri\target\release\bundle -Recurse -File |
            Where-Object { $_.Extension -in ".msi", ".exe" }

          if (-not $candidates) {
            throw "No Windows installer artifact was found under src-tauri\target\release\bundle."
          }

          foreach ($candidate in $candidates) {
            Copy-Item -LiteralPath $candidate.FullName -Destination dist-artifacts
          }

          Get-ChildItem -Path dist-artifacts -File | ForEach-Object {
            $hash = Get-FileHash -Algorithm SHA256 -LiteralPath $_.FullName
            "$($hash.Hash)  $($_.Name)" | Out-File -FilePath "dist-artifacts\$($_.Name).sha256" -Encoding ascii
          }

      - name: Upload installer artifact
        uses: actions/upload-artifact@v6
        with:
          name: radar-escola-windows-installer
          path: dist-artifacts/*
          if-no-files-found: error

  publish-github-release:
    name: Publish GitHub release
    if: startsWith(github.ref, 'refs/tags/v') && needs.build-windows-installer.result == 'success'
    runs-on: ubuntu-latest
    needs:
      - build-windows-installer
    permissions:
      contents: write
    steps:
      - name: Download installer artifact
        uses: actions/download-artifact@v6
        with:
          name: radar-escola-windows-installer
          path: dist-artifacts

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" dist-artifacts/* \
            --repo "$GITHUB_REPOSITORY" \
            --title "$GITHUB_REF_NAME" \
            --notes "Release desktop do Radar Escola para Windows. Baixe o instalador e confira o arquivo .sha256 antes de instalar."
